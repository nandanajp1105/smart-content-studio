<!DOCTYPE html>
<html>
<head>
  <title>Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-black to-gray-800 text-white flex">
<div class="w-64 h-screen bg-black bg-opacity-70 p-5 backdrop-blur-lg">
  <h2 class="text-2xl font-bold mb-8">🚀 Studio</h2>
  <ul>
    <li class="mb-4"><a href="/">Dashboard</a></li>
    <li class="mb-4"><a href="/generator">Generator</a></li>
    <li class="mb-4"><a href="/analyzer">Analyzer</a></li>
    <li class="mb-4"><a href="/dashboard">Analytics</a></li>
  </ul>
</div>

<div class="flex-1 p-10 bg-black bg-opacity-60 backdrop-blur-sm">

  <h1 class="text-3xl font-bold mb-6 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
    Analytics Dashboard
  </h1>

  <div class="bg-white bg-opacity-10 backdrop-blur-lg p-6 rounded-xl">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
    datasets: [{
      label: 'Engagement Growth',
      data: [5, 12, 8, 15, 20, 18],
      tension: 0.4
    }]
  }
});
</script>

</body>
</html>
