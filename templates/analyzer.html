<!DOCTYPE html>
<html>
<head>
  <title>Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-black to-gray-800 text-white flex">
<div class="w-64 h-screen bg-black bg-opacity-70 p-5 backdrop-blur-lg">
  <h2 class="text-2xl font-bold mb-8">🚀 Studio</h2>
  <ul>
    <li class="mb-4"><a href="/">Dashboard</a></li>
    <li class="mb-4"><a href="/generator">Generator</a></li>
    <li class="mb-4"><a href="/analyzer">Analyzer</a></li>
    <li class="mb-4"><a href="/dashboard">Analytics</a></li>
  </ul>
</div>

<div class="flex-1 p-10 bg-black bg-opacity-60 backdrop-blur-sm text-center">

  <h1 class="text-3xl font-bold mb-6">Post Analyzer</h1>

  <div class="bg-white bg-opacity-10 backdrop-blur-lg p-6 rounded-xl inline-block">

    <input id="likes" placeholder="Likes" class="p-2 m-2 text-black"><br>
    <input id="comments" placeholder="Comments" class="p-2 m-2 text-black"><br>
    <input id="followers" placeholder="Followers" class="p-2 m-2 text-black"><br>

    <button onclick="analyze()" 
      class="px-6 py-2 bg-blue-500 rounded hover:bg-blue-600 mt-4">
      Analyze
    </button>

    <div id="result" class="mt-4 text-green-400"></div>

  </div>

</div>

<script>
function analyze() {
  fetch('/analyze', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      likes: document.getElementById('likes').value,
      comments: document.getElementById('comments').value,
      followers: document.getElementById('followers').value
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById('result').innerText =
      `Engagement: ${data.engagement}% (${data.status})`;
  });
}
</script>

</body>
</html>
